<script>
(async () => {
  try {
    const r = await fetch('https://zoom-sdk-config.github-b13.workers.dev/config');
    const { apiKey } = await r.json();
    const s = document.createElement('script');
    s.type = 'module';
    s.src = 'https://us01ccistatic.zoom.us/us01cci/web-sdk/chat-client.js';
    s.setAttribute('data-apikey', apiKey);
    s.setAttribute('data-env', 'us01');
    s.setAttribute('data-chat-entry-id', '-F7UP_5LQeGSqdocbDvKwQ');
    document.head.appendChild(s);
  } catch(e) { console.error('Zoom chat SDK init failed', e); }
})();
</script>
