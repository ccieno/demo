<!DOCTYPE html>
<html>

<head>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <title>Zoom & Hotel Brand</title>

    <style>
        body {
            margin: 0;
            background-color: #ffffff; /* white side margins */
            font-family: 'Raleway', sans-serif;
        }

        .image-container {
            width: 100%;
            display: flex;
            justify-content: center; /* centers horizontally */
        }

        .image-container img {
            width: 80%;      /* 80% width */
            height: auto;    /* maintain aspect ratio */
            display: block;
        }
    </style>

</head>

<body>

    <div class="image-container">
        <img src="img/resort.png" alt="Luxury Hotel Landing Page">
    </div>

</body>

<script>
(async () => {
  try {
    const r = await fetch('https://zoom-sdk-config.github-b13.workers.dev/config');
    const { apiKey } = await r.json();
    const s = document.createElement('script');
    s.type = 'module';
    s.src = 'https://us01ccistatic.zoom.us/us01cci/web-sdk/zcc-sdk.js';
    s.setAttribute('data-apikey', apiKey);
    s.setAttribute('data-env', 'us01');
    document.head.appendChild(s);
  } catch(e) { console.error('Zoom SDK init failed', e); }
})();
</script>

</html>
